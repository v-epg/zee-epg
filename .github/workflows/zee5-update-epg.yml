name: Zee5 EPG

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Days to fetch (1-7)"
        required: false
        default: "3"
      lang:
        description: "Language filter (tamil,telugu,kannada,hindi...)"
        required: false
        default: ""

  schedule:
    - cron: "0 20 * * *" # 1:30 AM IST

permissions:
  contents: write

concurrency:
  group: zee5-epg
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Public Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Checkout Private Repo
        uses: actions/checkout@v4
        with:
          repository: vgit-push/zee5
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          path: private-src

      - name: Generate EPG
        env:
          SUNNXT_PROXY: ${{ secrets.SUNNXT_PROXY }}
          ZEE5_TOKEN: ${{ secrets.ZEE5_TOKEN }}
        run: |
          DAYS="${{ github.event.inputs.days || '3' }}"
          LANG="${{ github.event.inputs.lang }}"

          echo "Days: $DAYS"
          echo "Lang: $LANG"

          CMD="python3 private-src/zee5_epg.py \
            --days $DAYS \
            --output zee5_epg.xml \
            --gz"

          if [ -n "$LANG" ]; then
            CMD="$CMD --lang \"$LANG\""
          fi

          echo "Running: $CMD"
          eval "$CMD"

      - name: Verify Output
        run: |
          test -f zee5_epg.xml
          test -f zee5_epg.xml.gz

      - name: Show Stats
        run: |
          ls -lh zee5_epg.xml zee5_epg.xml.gz
          echo "Channels   : $(grep -c '<channel ' zee5_epg.xml || true)"
          echo "Programmes : $(grep -c '<programme ' zee5_epg.xml || true)"

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add zee5_epg.xml zee5_epg.xml.gz

          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi

          git commit -m "Zee5 EPG Update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
