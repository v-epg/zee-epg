name: Zee5 EPG

on:
  workflow_dispatch:
    inputs:
      days:
        description: 'Days to fetch (1-7)'
        default: '3'
      lang:
        description: 'Language filter (tamil,telugu,kannada,hindi...)'
        default: ''
  schedule:
    - cron: '0 20 * * *'   # Daily 1:30 AM IST

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Public Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Checkout Private Repo
        uses: actions/checkout@v4
        with:
          repository: vgit-push/zee5
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          path: private-src

      - name: Generate EPG
        env:
          ZEE5_TOKEN: ${{ secrets.ZEE5_TOKEN }}
        run: |
          DAYS="${{ github.event.inputs.days || '3' }}"
          LANG="${{ github.event.inputs.lang }}"
          if [ -n "$LANG" ]; then
            python3 private-src/zee5_epg.py --days $DAYS --lang "$LANG" --output zee5_epg.xml --gz
          else
            python3 private-src/zee5_epg.py --days $DAYS --output zee5_epg.xml --gz
          fi

      - name: Show Stats
        run: |
          ls -lh zee5_epg.xml zee5_epg.xml.gz
          echo "Channels   : $(grep -c '<channel' zee5_epg.xml)"
          echo "Programmes : $(grep -c '<programme' zee5_epg.xml)"

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add zee5_epg.xml zee5_epg.xml.gz
          git diff --staged --quiet && exit 0
          git commit -m "EPG Update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
